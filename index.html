<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ATLAS - GDPR Study Workspace</title>
    <style>
      :root {
        --ink: #101820;
        --muted: #8fa3b7;
        --line: #d8dee6;
        --paper: #f7f4ec;
        --panel: #ffffff;
        --nav: #071622;
        --nav-panel: #111d2a;
        --blue: #7f9fbd;
        --teal: #2f7773;
        --gold: #c39743;
        --rose: #bd3d55;
        --soft-blue: #edf3f8;
        --soft-teal: #e8f3f0;
        --soft-gold: #fff4dc;
        --shadow: 0 18px 45px rgba(7, 22, 34, 0.13);
        --serif: "Playfair Display", "Times New Roman", Times, serif;
        --sans: "Times New Roman", Times, serif;
        --mono: "IBM Plex Mono", ui-monospace, monospace;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        background: var(--paper);
        color: var(--ink);
        font-family: var(--sans);
      }

      button, input, textarea {
        font: inherit;
      }

      .app {
        min-height: 100vh;
        display: grid;
        grid-template-columns: 300px minmax(0, 1fr) 360px;
      }

      .sidebar {
        background: var(--nav);
        color: #f7f4ec;
        padding: 28px 24px;
        min-height: 100vh;
        position: sticky;
        top: 0;
        overflow-y: auto;
      }

      .brand {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 12px;
        margin-bottom: 18px;
      }

      .brand-logo {
        width: 44px;
        height: 44px;
        object-fit: contain;
        flex: 0 0 auto;
      }

      .brand h1 {
        margin: 0;
        font-size: 30px;
        letter-spacing: 0;
        font-family: var(--serif);
        font-weight: 600;
      }

      .brand p {
        margin: 2px 0 0;
        color: var(--muted);
        font-size: 13px;
      }

      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 9px;
        color: var(--muted);
        text-decoration: none;
        font-family: var(--mono);
        font-size: 15px;
        margin: 6px 0 24px;
      }

      .back-link:hover {
        color: #f7f4ec;
      }
